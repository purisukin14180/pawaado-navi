<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KFYD72JSBG"></script>

    <meta charset="UTF-8">

    <title>育成シミュレーター | プリスキンのパワアド育成ナビ</title>
    <style>
        :root {
            --story-bg: #4a2f1a;
            --story-paper: #e9d5b5;
            --story-panel: #7c5535;
            --story-border: #9e7a5c;
            --story-accent: #d35400;
            --story-text: #3e2714;
            --story-text-light: #f4ece0;
            --nav-height: 60px;
            --color-muscle: #ff4d4d; --color-agile: #4da6ff; --color-tech: #ff9933; --color-intel: #cc99ff; --color-mental: #99ff66;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, serif;
            margin: 0; padding: 0;
            background-color: var(--story-bg);
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4BCFAAAABGdBTUEAALGPC/xhBQAAAAFzUkdCAK7OHOkAAAAzUExURf///8DAwL+/v76+vr29vby8vLu7u7m5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ucp7H40AAAAQdFJOUwAgMEBQYHCAgI+fmKCgoMCwS645uAAAARRJREFUOMuVlVuWwyAMRAtIGOf+V22S45K8S9NfWp445SNoAt4H6I8f/wP0Zf8A/bHjL4B+0T8A/Xz9F0Df6B+AftY/AP14/Rdgf9A/oF9b/wXon8ZfAP4M+XNk49L4XwD+DPlzZOPS+FsAfgz5c2Tj0vgXIBuXxn8BsnFp/BcAW79uXBr/AsTWX7f9K4CtXzcu5V+AbFwa/wXA1q8bl8p/AbLx68al/AsAW79unMpfALb+2u1PAbLxK7Y7BcjGr9juFCAbt2K7XwCx9etWbE8Btv7alXcB2vYvX94CaNu/fPkXoG375etXgL7Y7BcgW//15U8AsvVfV94FyNafX3kXQNv6S9f/AVp55SND5bU6AAAAAElFTkSuQmCC');
            color: var(--story-text-light);
            line-height: 1.2;
            touch-action: manipulation;
        }

        .topnav { display: flex; justify-content: flex-start; align-items: center; background: #2c1a0c; height: var(--nav-height); padding: 0 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--story-accent); }
        .nav-links a { color: #fff; text-decoration: none; padding: 8px 12px; font-size: 0.9rem; font-weight: bold; border-radius: 4px; }
        .nav-links a.current { background: var(--story-accent); }

        .exp-banner { background-color: #3e2714; padding: 10px 5px; text-align: center; position: sticky; top: var(--nav-height); z-index: 999; border-bottom: 2px solid var(--story-border); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
        .exp-banner-title { font-size: 0.75rem; font-weight: bold; color: var(--story-paper); margin-bottom: 5px; letter-spacing: 0.1em;}
        .exp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; max-width: 600px; margin: 0 auto; }
        .exp-grid div { background: rgba(0,0,0,0.4); border: 1px solid var(--story-border); padding: 4px 0; border-radius: 4px; font-size: 0.65rem; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .exp-muscle { color: var(--color-muscle); } .exp-agile { color: var(--color-agile); } .exp-tech { color: var(--color-tech); } .exp-intel { color: var(--color-intel); } .exp-mental { color: var(--color-mental); }
        .exp-grid span { display: block; font-size: 0.95rem; font-weight: 900; margin-top: 2px; }

        #app { max-width: 800px; margin: 0 auto; padding: 10px; box-sizing: border-box; }
        .card { background: var(--story-panel); border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 2px solid var(--story-border); color: var(--story-paper); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid var(--story-border);}
        h2 { font-size: 0.9rem; margin: 0; font-weight: bold; }

        .stat-grid-6col { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .stat-unit { background: rgba(0, 0, 0, 0.15); border: 1px solid var(--story-border); padding: 6px 2px; display: flex; flex-direction: column; align-items: center; border-radius: 4px; }
        .stat-name-label { font-size: 0.65rem; font-weight: bold; color: var(--story-paper); margin-bottom: 4px; }
        .num-input { width: 90%; border: 1px solid #c9ad88; border-radius: 2px; text-align: center; font-size: 1rem; font-weight: 900; background: var(--story-paper); color: var(--story-text); padding: 2px 0; outline: none; }
        .target-ctrl { width: 100%; display: flex; flex-direction: column; gap: 2px; margin: 4px 0; }
        .btn-step { 
            width: 100%; border: none; background: #604028; color: var(--story-paper); font-size: 0.75rem; font-weight: bold; padding: 2px 0; cursor: pointer; border-radius: 2px;
            user-select: none; -webkit-user-select: none;
        }
        .btn-step:active { background: var(--story-accent); }
        
        .rank-box { font-size: 0.85rem; font-weight: 900; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; margin: 2px 0; text-align: center; min-width: 20px; }
        .rank-G { color: #f4ece0; } .rank-F { color: #4da6ff; } .rank-E { color: #2ecc71; } .rank-D { color: #e67e22; } .rank-C { color: #f1c40f; } .rank-B { color: #e74c3c; } .rank-A { color: #ff00ff; } .rank-S { color: #ffd700; text-shadow: 0 0 5px gold; }
        .diff-text { font-size: 0.6rem; color: #ffd700; font-weight: bold; }
        .kotsu-check { display: flex; align-items: center; justify-content: center; gap: 2px; margin-top: 5px; cursor: pointer; }
        .kotsu-check span { font-size: 0.6rem; font-weight: bold; color: var(--story-paper); }
        .btn-reset-single { background: rgba(0,0,0,0.2); color: #c9ad88; border: 1px solid var(--story-border); font-size: 0.5rem; margin-top: 4px; padding: 2px 0; width: 100%; cursor: pointer; border-radius: 2px; }

        .btn-share { background: var(--story-accent); color: #fff; border: 2px solid #e67e22; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 12px; }
        .search-input-main { width: 100%; padding: 12px; border: 1px solid #c9ad88; border-radius: 4px; background: var(--story-paper); color: var(--story-text); box-sizing: border-box; text-align: center; font-size: 1rem;}
        
        .sim-filters { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .sim-filters select { 
            background: #604028; color: #fff; border: 1px solid var(--story-border); padding: 10px 2px; border-radius: 4px; 
            font-size: 0.75rem; font-weight: bold; text-align: center; text-align-last: center; cursor: pointer;
        }
        .full-width-select { grid-column: span 3; margin-bottom: 4px; }

        .skill-container { background: rgba(0,0,0,0.2); border: 1px solid var(--story-border); border-radius: 4px; margin-bottom: 6px; overflow: hidden; }
        .skill-summary { padding: 10px; display: flex; flex-direction: column; gap: 6px; cursor: pointer; }
        .summary-top { display: flex; justify-content: space-between; align-items: center; }
        .skill-name-area { font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .toggle-icon { font-size: 0.5rem; transition: 0.2s; color: var(--story-accent); }
        .inline-costs { display: flex; flex-wrap: wrap; gap: 4px; }
        .cost-tag { font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; font-weight: bold; background: rgba(0,0,0,0.3); }
        .skill-detail { padding: 10px; background: rgba(0,0,0,0.3); border-top: 1px dashed var(--story-border); font-size: 0.75rem; }

        .c-m { color: var(--color-muscle); } .c-g { color: var(--color-agile); } .c-t { color: var(--color-tech); } .c-i { color: var(--color-intel); } .c-me { color: var(--color-mental); }

        footer { text-align: center; padding: 40px 15px; background: #2c1a0c; color: #888; margin-top: 20px; font-size: 0.75rem; border-top: 2px solid var(--story-border); }
        .footer-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; font-size: 0.85rem; margin-bottom: 20px; }
        .footer-nav a { color: #fff; text-decoration: none; opacity: 0.7; }
        @media (max-width: 600px) { .stat-grid-6col { gap: 2px; } }
    </style>
</head>
<body>

<header class="topnav">
    <nav class="nav-links">
        <a href="index.html">ホーム</a>
        <a href="simulator.html" class="current">シミュレーター</a>
        <a href="search.html">特能図鑑</a>
    </nav>
</header>

<div class="exp-banner">
    <div class="exp-banner-title">◆ 必要経験点 合計 ◆</div>
    <div class="exp-grid">
        <div class="exp-muscle">筋力<span id="total-muscle">0</span></div>
        <div class="exp-agile">敏捷<span id="total-agile">0</span></div>
        <div class="exp-tech">技術<span id="total-tech">0</span></div>
        <div class="exp-intel">知力<span id="total-intel">0</span></div>
        <div class="exp-mental">精神<span id="total-mental">0</span></div>
    </div>
</div>

<div id="app">
    <main>
        <button class="btn-share" onclick="copyShareURL()">🔗 この育成計画を共有する (URLコピー)</button>

        <section class="card">
            <div class="card-header"><h2>教本プリセット反映</h2></div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <select id="preset-select" style="background: #604028; color: #fff; border: 1px solid var(--story-border); padding: 10px; border-radius: 4px; text-align-last: center;">
                    <option value="">教本を選択してください</option>
                    <optgroup label="剣士"><option value="ken_1">初級</option><option value="ken_2">中級</option><option value="ken_3">上級</option></optgroup>
                    <optgroup label="弓使い"><option value="yumi_1">初級</option><option value="yumi_2">中級</option><option value="yumi_3">上級</option></optgroup>
                    <optgroup label="魔法使い"><option value="maho_1">初級</option><option value="maho_2">中級</option><option value="maho_3">上級</option></optgroup>
                    <optgroup label="魔闘士"><option value="mato_1">初級</option><option value="mato_2">中級</option><option value="mato_3">上級</option></optgroup>
                </select>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button onclick="applyPreset('target')" style="background: var(--story-accent); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; cursor: pointer;">目標能力に反映</button>
                    <button onclick="applyPreset('start')" style="background: #8e44ad; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; cursor: pointer;">現在能力に反映</button>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="card-header"><h2>現在の能力値</h2><button onclick="resetAllStarts()" style="font-size:0.6rem;">全リセ</button></div>
            <div class="stat-grid-6col" id="start-stats-container"></div>
        </section>

        <section class="card">
            <div class="card-header"><h2>目標能力 ・ コツ</h2><button onclick="resetAllTargets()" style="font-size:0.6rem;">全リセ</button></div>
            <div class="stat-grid-6col" id="target-stats-container"></div>
        </section>

        <section class="card">
            <div class="card-header"><h2>修得予定スキル</h2><button onclick="resetAbilities()" style="font-size:0.6rem;">全削除</button></div>
            <div id="selected-list"></div>
        </section>

        <section class="card">
            <h2>スキル検索</h2>
            <input type="text" id="search-input" class="search-input-main" placeholder="能力名で検索..." oninput="searchInSim()">
            
            <div class="sim-filters">
                <select id="fCat" onchange="searchInSim()" class="full-width-select">
                    <option value="">全スキル種別 (詳細フィルタ)</option>
                    <optgroup label="サポート">
                        <option value="サポートスキル・青">サポート・青</option>
                        <option value="サポートスキル・金">サポート・金</option>
                        <option value="サポートスキル・青赤">サポート・青赤</option>
                    </optgroup>
                    <optgroup label="アクション">
                        <option value="アクションスキル・青">アクション・青</option>
                        <option value="アクションスキル・金">アクション・金</option>
                    </optgroup>
                    <optgroup label="必殺技">
                        <option value="必殺技・虹">必殺技・虹</option>
                    </optgroup>
                </select>

                <select id="fAttr" onchange="searchInSim()">
                    <option value="">全属性</option>
                    <option value="火">火属性</option>
                    <option value="風">風属性</option>
                    <option value="水">水属性</option>
                    <option value="無属性">無属性</option>
                </select>

                <select id="fJob" onchange="searchInSim()">
                    <option value="">全ジョブ</option>
                    <option value="剣士">剣士</option>
                    <option value="弓使い">弓使い</option>
                    <option value="魔法使い">魔法使い</option>
                    <option value="魔闘士">魔闘士</option>
                </select>

                <select id="fTarget" onchange="searchInSim()">
                    <option value="">その他</option>
                    <option value="特効">特効系</option>
                    <option value="耐性">耐性系</option>
                </select>
            </div>
            
            <div id="search-results" style="margin-top:10px; max-height:400px; overflow-y:auto;"></div>
        </section>
    </main>
</div>

<footer>
    <div class="footer-nav">

    </div>

</footer>

<script src="action-skills.js"></script>

<script>
    const SPECIAL_ABILITIES = [
        ...(typeof SUPPORT_SKILLS !== 'undefined' ? SUPPORT_SKILLS : []),
        ...(typeof ACTION_SKILLS !== 'undefined' ? ACTION_SKILLS : []),
        ...(typeof HISSATSU_SKILLS !== 'undefined' ? HISSATSU_SKILLS : [])
    ];
</script>
<script src="script.js"></script>
</body>
