<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KFYD72JSBG"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>キャラコツ検索 | プリスキンのパワアド育成ナビ</title>
    <style>
        :root {
            --story-bg: #4a2f1a;
            --story-paper: #e9d5b5;
            --story-panel: #7c5535;
            --story-border: #9e7a5c;
            --story-accent: #d35400;
            --story-text: #3e2714;
            --story-text-light: #f4ece0;
            --nav-height: 60px;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, serif;
            margin: 0; padding: 0; background-color: var(--story-bg);
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4BCFAAAABGdBTUEAALGPC/xhBQAAAAFzUkdCAK7OHOkAAAAzUExURf///8DAwL+/v76+vr29vby8vLu7u7m5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ucp7H40AAAAQdFJOUwAgMEBQYHCAgI+fmKCgoMCwS645uAAAARRJREFUOMuVlVuWwyAMRAtIGOf+V22S45K8S9NfWp445SNoAt4H6I8f/wP0Zf8A/bHjL4B+0T8A/Xz9F0Df6B+AftY/AP14/Rdgf9A/oF9b/wXon8ZfAP4M+XNk49L4XwD+DPlzZOPS+FsAfgz5c2Tj0vgXIBuXxn8BsnFp/BcAW79uXBr/AsTWX7f9K4CtXzcu5V+AbFwa/wXA1q8bl8p/AbLx68al/AsAW79unMpfALb+2u1PAbLxK7Y7BcjGr9juFCAbt2K7XwCx9etWbE8Btv7alXcB2vYvX94CaNu/fPkXoG375etXgL7Y7BcgW//15U8AsvVfV94FyNafX3kXQNv6S9f/AVp55SND5bU6AAAAAElFTkSuQmCC');
            color: var(--story-text-light); line-height: 1.6;
        }

        .topnav {
            display: flex; justify-content: flex-start; align-items: center;
            background: #2c1a0c; color: #fff; height: var(--nav-height); padding: 0 10px;
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--story-accent);
        }
        .nav-links { display: flex; overflow-x: auto; white-space: nowrap; gap: 5px; width: 100%; }
        .nav-links a { color: #fff; text-decoration: none; padding: 8px 12px; font-size: 0.9rem; font-weight: bold; border-radius: 4px; }
        .nav-links a.current { background: var(--story-accent); }

        .container { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 120px); }

        .sidebar { 
            width: 300px; background: var(--story-panel); padding: 20px; border-right: 2px solid var(--story-border); 
            height: calc(100vh - 60px); position: sticky; top: 60px; box-sizing: border-box; overflow-y: auto;
        }
        .sidebar h3 { font-size: 1.1rem; margin: 0 0 20px; color: var(--story-paper); border-left: 4px solid var(--story-accent); padding-left: 10px; }
        .search-input { width: 100%; padding: 12px; border: 1px solid var(--story-border); border-radius: 4px; margin-bottom: 20px; font-size: 0.9rem; background: var(--story-paper); color: var(--story-text); box-sizing: border-box; outline: none; }

        .filter-section { margin-bottom: 15px; border: 1px solid var(--story-border); border-radius: 4px; overflow: hidden; background: rgba(0,0,0,0.1); }
        .filter-title { font-size: 0.8rem; font-weight: bold; background: rgba(0,0,0,0.2); color: var(--story-paper); padding: 8px 12px; border-bottom: 1px solid var(--story-border); }
        .filter-options { padding: 8px; }
        select { width: 100%; padding: 10px; border: 1px solid var(--story-border); border-radius: 4px; font-size: 0.85rem; outline: none; background: #604028; color: var(--story-paper); }

        .main { flex: 1; padding: 20px; }
        .main h1 { font-size: 1.4rem; margin: 0 0 20px; color: var(--story-paper); text-shadow: 2px 2px 0 rgba(0,0,0,0.5); }

        .ability-card { 
            display: flex; background: var(--story-paper); border-radius: 4px; margin-bottom: 15px; 
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2); border: 1px solid #c9ad88; border-left: 10px solid var(--story-accent);
            color: var(--story-text); overflow: hidden;
        }
        
        .chara-img-area { width: 140px; min-width: 140px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; border-right: 1px dashed #c9ad88; }
        .chara-img-area img { max-width: 100%; height: auto; max-height: 160px; object-fit: contain; }

        .chara-content { padding: 16px; flex: 1; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .ability-title { font-size: 1.2rem; font-weight: 800; color: var(--story-text); }
        .chara-id { font-size: 0.75rem; font-weight: bold; color: #8a6d55; }

        .skill-group { margin-bottom: 12px; }
        .skill-label { font-size: 0.65rem; font-weight: bold; color: #8a6d55; display: block; margin-bottom: 4px; }
        .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; }

        .tag-base {
            display: inline-flex; align-items: center;
            padding: 4px 12px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.2);
            font-size: 0.85rem; font-weight: 900;
            text-shadow: 0 1px 1px rgba(255,255,255,0.3);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.4);
        }

        /* ★虹必殺技★ */
        .tag-rainbow {
            background: linear-gradient(110deg, #ff9a9e, #fad0c4, #fad0c4, #a1c4fd, #c2e9fb, #ff9a9e);
            background-size: 200% auto;
            color: #4b2c20;
            border-color: #f5cba7;
            animation: shine 4s linear infinite;
            box-shadow: 0 0 8px rgba(255,154,158,0.5);
        }

        /* ★金特：赤みを抑えた純・黄金グラデーション★ */
        .tag-gold {
            background: linear-gradient(135deg, #ffd700 0%, #fff385 50%, #ffd700 100%);
            background-size: 200% auto;
            color: #5d4037;
            border-color: #b8860b;
            animation: shine 5s ease infinite;
        }

        /* ★青特★ */
        .tag-blue {
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            color: #1b4f72;
            border-color: #5dade2;
        }

        /* 通常コツ */
        .tag-normal { background: #dfccaf; color: var(--story-text); border-color: #c9ad88; }

        @keyframes shine {
            to { background-position: 200% center; }
        }
        
        .skill-cond { font-size: 0.7rem; color: inherit; font-weight: bold; margin-left: 4px; opacity: 0.7; }
        #resCount { font-size: 0.8rem; color: var(--story-paper); text-align: right; margin-top: 10px; font-weight: bold; }

        @media (max-width: 700px) { 
            .container { flex-direction: column; } 
            .sidebar { width: 100%; height: auto; position: relative; top: 0; border-right: none; }
            .ability-card { flex-direction: column; }
            .chara-img-area { width: 100%; height: 140px; border-right: none; border-bottom: 1px dashed #c9ad88; }
        }
    </style>
</head>
<body>

<header class="topnav">
    <nav class="nav-links">
        <a href="index.html">ホーム</a>
        <a href="simulator.html">シミュレーター</a>
        <a href="search.html">特能図鑑</a>
        <a href="chara_search.html" class="current">コツ検索</a>
    </nav>
</header>

<div class="container">
    <div class="sidebar">
        <h3>条件で絞り込む</h3>
        <input type="text" id="q" class="search-input" placeholder="名前、コツ、スキル...">

        <div class="filter-section">
            <div class="filter-title">属性</div>
            <div class="filter-options">
                <select id="fAttr">
                    <option value="">すべての属性</option>
                    <option value="火属性">火属性</option>
                    <option value="水属性">水属性</option>
                    <option value="風属性">風属性</option>
                </select>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title">ジョブ</div>
            <div class="filter-options">
                <select id="fJob">
                    <option value="">すべてのジョブ</option>
                    <option value="剣士">剣士</option>
                    <option value="弓使い">弓使い</option>
                    <option value="魔法使い">魔法使い</option>
                    <option value="魔闘士">魔闘士</option>
                    <option value="重戦士">重戦士</option>
                    <option value="僧侶">僧侶</option>
                </select>
            </div>
        </div>

        <div id="resCount">0 件ヒット</div>
    </div>

    <div class="main">
        <h1>イベキャラコツ検索</h1>
        <div id="list">読み込み中...</div>
    </div>
</div>

<script src="charaData.js"></script>
<script>
    const listEl = document.getElementById('list');
    const qEl = document.getElementById('q');
    const attrEl = document.getElementById('fAttr');
    const jobEl = document.getElementById('fJob');
    const countEl = document.getElementById('resCount');

    function render() {
        const query = qEl.value.trim().toLowerCase();
        const attrFilter = attrEl.value;
        const jobFilter = jobEl.value;

        const filtered = CHARA_MASTER_DATA.filter(c => {
            const rCond = SKILL_REQUIREMENTS.rainbow[c.rainbow] || "";
            const aCond = SKILL_REQUIREMENTS.goldA[c.goldA] || "";
            
            const matchAttr = !attrFilter || (rCond + aCond).includes(attrFilter);
            const matchJob = !jobFilter || (rCond + aCond).includes(jobFilter);
            
            const searchTarget = `${c.name} ${c.rainbow} ${c.goldA} ${c.goldS} ${c.blueS.join(' ')}`.toLowerCase();
            const matchQ = !query || searchTarget.includes(query);

            return matchAttr && matchJob && matchQ;
        });

        countEl.textContent = `${filtered.length} 件ヒット`;

        if (filtered.length === 0) {
            listEl.innerHTML = '<p style="text-align:center; padding:40px;">一致するキャラはいません</p>';
            return;
        }

        listEl.innerHTML = filtered.map(c => {
            const rReq = SKILL_REQUIREMENTS.rainbow[c.rainbow] || "";
            const aReq = SKILL_REQUIREMENTS.goldA[c.goldA] || "";

            return `
                <div class="ability-card">
                    <div class="chara-img-area">
                        <img src="${c.img}" alt="${c.name}" onerror="this.style.opacity='0';">
                    </div>
                    <div class="chara-content">
                        <div class="card-top">
                            <div class="ability-title">${c.name}</div>
                            <div class="chara-id">No.${c.id}</div>
                        </div>

                        <div class="skill-group">
                            <span class="skill-label">虹必殺技 / 金アクション</span>
                            <div class="skill-tags">
                                ${c.rainbow ? `<div class="tag-base tag-rainbow">${c.rainbow}<span class="skill-cond">(${rReq})</span></div>` : ''}
                                ${c.goldA ? `<div class="tag-base tag-gold">${c.goldA}<span class="skill-cond">(${aReq})</span></div>` : ''}
                                ${(!c.rainbow && !c.goldA) ? '<span style="color:#8a6d55; font-size:0.85rem;">ー</span>' : ''}
                            </div>
                        </div>

                        <div class="skill-group">
                            <span class="skill-label">金サポート</span>
                            <div class="skill-tags">
                                ${c.goldS ? `<div class="tag-base tag-gold">${c.goldS}</div>` : 'ー'}
                            </div>
                        </div>

                        <div class="skill-group">
                            <span class="skill-label">青サポート</span>
                            <div class="skill-tags">
                                ${c.blueS.map(s => `<div class="tag-base tag-blue">${s}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    [qEl, attrEl, jobEl].forEach(el => el.addEventListener('input', render));
    window.onload = render;
</script>
</body>
</html>
